<svg viewBox="0 0 600 600" width="600" height="600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cs-t cs-d">
  <title id="cs-t">九月の星図</title>
  <desc id="cs-d">秋の四辺形と尾を引く伴星の図</desc>
  <!-- 結線 -->
  <g stroke="#b8863f" stroke-width="1.6" stroke-opacity="0.78" fill="none">
    <path d="M180 160 L430 190 L400 420 L160 390 Z"/>
    <path d="M430 190 L520 110"/>
    <path d="M180 160 L110 260"/>
  </g>
  <!-- 主星と光芒 -->
  <g stroke="#b8863f" stroke-width="1.8" stroke-opacity="0.95">
    <line x1="180" y1="132" x2="180" y2="156"/>
    <line x1="180" y1="164" x2="180" y2="188"/>
    <line x1="152" y1="160" x2="176" y2="160"/>
    <line x1="184" y1="160" x2="208" y2="160"/>
  </g>
  <g fill="#b8863f">
    <circle cx="180" cy="160" r="5"/>
    <circle cx="430" cy="190" r="3.8"/>
    <circle cx="400" cy="420" r="3.8"/>
    <circle cx="160" cy="390" r="3.8"/>
    <circle cx="520" cy="110" r="2.6"/>
    <circle cx="110" cy="260" r="2.6"/>
  </g>
  <!-- 微光星 -->
  <g fill="#ddd0af" fill-opacity="0.9">
    <circle cx="300" cy="530" r="1.8"/>
    <circle cx="80" cy="80" r="1.8"/>
    <circle cx="540" cy="330" r="1.5"/>
    <circle cx="290" cy="290" r="1.5"/>
  </g>
</svg>
